<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Toastique Pop Ups">
  <title>Toastique Pop Ups</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      background: #FAF8F5;
      color: #2C2C2C;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #FAF8F5;
      padding: 24px 0 16px;
      text-align: center;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .header img {
      height: 48px;
      width: auto;
    }

    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 16px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #B8956A;
      margin-top: 8px;
    }

    /* Menu Grid */
    .menu {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px 40px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    @media (min-width: 900px) {
      .menu {
        grid-template-columns: repeat(3, 1fr);
        gap: 32px;
        padding: 40px 40px 48px;
      }
    }

    @media (min-width: 1200px) {
      .menu {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    /* Product Card */
    .card {
      background: #FFFFFF;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
    }

    .card:active {
      transform: scale(0.97);
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }

    .card-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      background: #F0EDE8;
    }

    .card-body {
      padding: 16px;
    }

    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: 18px;
      line-height: 1.3;
      color: #2C2C2C;
      margin-bottom: 6px;
    }

    .card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-price {
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      font-size: 15px;
      color: #B8956A;
    }

    .card-add {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #2C2C2C;
      color: #FAF8F5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 300;
      line-height: 1;
      flex-shrink: 0;
    }

    /* Cart Bar */
    .cart-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #2C2C2C;
      color: #FAF8F5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      z-index: 200;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }

    .cart-bar.visible {
      transform: translateY(0);
    }

    .cart-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .cart-count {
      background: #B8956A;
      color: #FFF;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
    }

    .cart-total {
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      font-size: 16px;
    }

    .cart-checkout {
      background: #B8956A;
      color: #FFF;
      border: none;
      padding: 12px 28px;
      border-radius: 30px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.5px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .cart-checkout:active {
      opacity: 0.85;
    }

    /* Empty state footer (shown when cart is empty) */
    .footer {
      background: #2C2C2C;
      color: #FAF8F5;
      text-align: center;
      padding: 20px 14px;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 1px;
    }

    /* Quantity badge on card */
    .qty-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #B8956A;
      color: #FFF;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 13px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.2s, transform 0.2s;
    }

    .qty-badge.show {
      opacity: 1;
      transform: scale(1);
    }

    /* Scroll padding for cart bar */
    .menu-wrapper {
      padding-bottom: 80px;
    }

    html {
      scroll-behavior: smooth;
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="images/toastique-logo.png" alt="Toastique">
    <h1>Pop Ups Menu</h1>
  </div>

  <div class="menu-wrapper">
    <div class="menu" id="menu"></div>
  </div>

  <div class="footer" id="footer">
    Tap an item to add it to your order
  </div>

  <div class="cart-bar" id="cartBar">
    <div class="cart-info">
      <div class="cart-count" id="cartCount">0</div>
      <div class="cart-total" id="cartTotal">$0.00</div>
    </div>
    <button class="cart-checkout" id="checkoutBtn">Checkout</button>
  </div>

  <script>
    const PRODUCTS = [
      { name: "Matcha Cups", price: 4.50, img: "images/matcha-cups.png", sqId: "4DJ73B3QMPQFMZ4374HFST7X" },
      { name: "Matcha 12oz", price: 5.00, img: "images/matcha-12oz.png", sqId: "I24RPXBNNU66COM4HG2FTUVJ" },
      { name: "Toasties", price: 4.00, img: "images/toasties.jpg", sqId: "61" },
      { name: "Superfood Bar", price: 3.50, img: "images/superfood-bar.jpg", sqId: "JAC4WWW2JV2QLFQLKWO7N3Q6" },
      { name: "Granola Bar", price: 4.50, img: "images/granola-bar.png", sqId: "JCD7RDM4Y54DE2736GXKRTRP" },
      { name: "Energy Balls", price: 4.00, img: "images/energy-balls.jpg", sqId: "ZRREM6KJECNJTLGHUP6QLPRZ" },
      { name: "Chia Pudding", price: 6.00, img: "images/chia-pudding.jpg", sqId: "T7JROSCXAV2YOOFLNJG4O2XX" },
      { name: "Cold Pressed Juice 16oz", price: 12.00, img: "images/16-oz--cold-pressed-juice-bottles.png", sqId: "42" },
      { name: "Cold Pressed Juice 8oz", price: 8.00, img: "images/8-oz--cold-pressed-juice-bottles.png", sqId: "26" },
      { name: "Immunity+ Shot", price: 5.00, img: "images/shot.png", sqId: "58" },
    ];

    const cart = {};
    const menuEl = document.getElementById('menu');
    const cartBar = document.getElementById('cartBar');
    const cartCount = document.getElementById('cartCount');
    const cartTotal = document.getElementById('cartTotal');
    const footer = document.getElementById('footer');
    const checkoutBtn = document.getElementById('checkoutBtn');

    function renderMenu() {
      menuEl.innerHTML = PRODUCTS.map((p, i) => `
        <div class="card" data-idx="${i}" onclick="addToCart(${i})">
          <span class="qty-badge" id="badge-${i}"></span>
          <img class="card-img" src="${p.img}" alt="${p.name}">
          <div class="card-body">
            <div class="card-name">${p.name}</div>
            <div class="card-row">
              <div class="card-price">$${p.price.toFixed(2)}</div>
              <div class="card-add">+</div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function addToCart(idx) {
      cart[idx] = (cart[idx] || 0) + 1;
      updateUI();
    }

    function updateUI() {
      let count = 0;
      let total = 0;
      for (const [idx, qty] of Object.entries(cart)) {
        count += qty;
        total += qty * PRODUCTS[idx].price;
      }

      // Update badges
      PRODUCTS.forEach((_, i) => {
        const badge = document.getElementById('badge-' + i);
        const qty = cart[i] || 0;
        badge.textContent = qty;
        badge.classList.toggle('show', qty > 0);
      });

      // Update cart bar
      cartCount.textContent = count;
      cartTotal.textContent = '$' + total.toFixed(2);

      if (count > 0) {
        cartBar.classList.add('visible');
        footer.style.display = 'none';
      } else {
        cartBar.classList.remove('visible');
        footer.style.display = '';
      }
    }

    checkoutBtn.addEventListener('click', () => {
      // Build Square order URL with all items
      // Square's order URL format: /s/order?cs=true&cst=custom&item=ID
      // For multiple items, we'll open the first one to get them into Square's flow
      // Unfortunately Square doesn't support multi-item deep links in one URL
      // So we'll redirect to the Square order page
      const baseUrl = 'https://toastiquewichita.square.site/s/order';
      
      // Get the first item in cart to deep-link
      const firstIdx = Object.keys(cart).find(k => cart[k] > 0);
      if (firstIdx !== undefined) {
        const item = PRODUCTS[firstIdx];
        window.location.href = baseUrl + '?cs=true&cst=custom&item=' + item.sqId;
      }
    });

    // Long press to remove
    let pressTimer;
    menuEl.addEventListener('touchstart', (e) => {
      const card = e.target.closest('.card');
      if (!card) return;
      const idx = parseInt(card.dataset.idx);
      pressTimer = setTimeout(() => {
        if (cart[idx] && cart[idx] > 0) {
          cart[idx]--;
          if (cart[idx] === 0) delete cart[idx];
          updateUI();
        }
      }, 600);
    });

    menuEl.addEventListener('touchend', () => clearTimeout(pressTimer));
    menuEl.addEventListener('touchmove', () => clearTimeout(pressTimer));

    renderMenu();
  </script>

</body>
</html>
